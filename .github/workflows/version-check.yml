name: Version check

on:
  pull_request:
    branches: [main]

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG + (on release) version bump for plugin changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          set -euo pipefail

          changed_files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$changed_files"
          echo

          # Paths that require a CHANGELOG update when touched.
          # Docs-only (README, CONTRIBUTING, CHANGELOG itself, LICENSE, .github/) do not.
          needs_changelog=false
          while IFS= read -r f; do
            case "$f" in
              plugins/cairn-notes/agents/*|\
              plugins/cairn-notes/commands/*|\
              plugins/cairn-notes/skills/*|\
              plugins/cairn-notes/AGENTS.md|\
              plugins/cairn-notes/CLAUDE.md|\
              plugins/cairn-notes/.claude-plugin/*|\
              .claude-plugin/*)
                needs_changelog=true
                echo "Touches versionable path: $f"
                ;;
            esac
          done <<< "$changed_files"

          if [ "$needs_changelog" = false ]; then
            echo "No versionable paths changed — skipping changelog check."
            exit 0
          fi

          echo
          echo "Versionable changes detected. Verifying CHANGELOG update."

          # Every versionable PR must touch CHANGELOG.md — either a bullet under
          # [Unreleased] (non-release PR) or a promoted section (release PR).
          if ! echo "$changed_files" | grep -Fxq "CHANGELOG.md"; then
            echo "::error file=CHANGELOG.md::CHANGELOG.md was not modified. Add a bullet under '## [Unreleased]', or cut a release (bump plugin.json + promote [Unreleased])."
            exit 1
          fi

          manifest="plugins/cairn-notes/.claude-plugin/plugin.json"

          # Resolve the manifest's path in the base tree. If this PR renamed
          # it, follow the rename so we can still compare versions; if it's a
          # genuinely new file (no rename source), treat as non-release.
          if git cat-file -e "$BASE_SHA:$manifest" 2>/dev/null; then
            base_manifest="$manifest"
          else
            # -M10% lowers the rename similarity threshold from git's default 50%.
            # A small file like plugin.json can dip below 50% when the description
            # is rewritten alongside the path change (this PR: 36% similarity).
            # Don't use `-- $manifest`: git diff's pathspec filters by the OLD
            # (deleted) path for renames, not the new one we already have.
            base_manifest=$(git diff -M10% --diff-filter=R --name-status "$BASE_SHA" "$HEAD_SHA" | awk -F'\t' -v new="$manifest" '$3 == new {print $2}' | head -1)
            if [ -z "$base_manifest" ]; then
              echo "Manifest '$manifest' is new in this PR (no rename source) — non-release context."
              echo "OK — CHANGELOG touched."
              exit 0
            fi
            echo "Manifest renamed from '$base_manifest' in this PR — using old path for base version."
          fi

          base_version=$(git show "$BASE_SHA:$base_manifest" | jq -r '.version')
          head_version=$(jq -r '.version' "$manifest")

          echo "Base version: $base_version"
          echo "Head version: $head_version"

          if [ "$base_version" = "$head_version" ]; then
            echo "Non-release PR — CHANGELOG update is sufficient (accumulating under [Unreleased])."
            echo "OK — version unchanged at $head_version, CHANGELOG touched."
            exit 0
          fi

          # Release PR: full Keep-a-Changelog checks.
          echo "Release PR detected ($base_version -> $head_version). Verifying release shape."

          # Keep-a-Changelog section for the new version must exist.
          if ! grep -Fq "## [$head_version]" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::No '## [$head_version]' section found. Promote [Unreleased] contents under a '## [$head_version]' heading dated today."
            exit 1
          fi

          # Footer link for the new version tag must exist.
          if ! grep -Fq "[$head_version]: $REPO_URL/releases/tag/v$head_version" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::Missing footer link '[$head_version]: $REPO_URL/releases/tag/v$head_version'. Add it alongside the existing version links."
            exit 1
          fi

          # [Unreleased] footer must retarget to the new version.
          if ! grep -Fq "[Unreleased]: $REPO_URL/compare/v$head_version...HEAD" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::'[Unreleased]' footer link must compare against v$head_version...HEAD. Update it when you cut a release."
            exit 1
          fi

          echo "OK — release PR: $base_version -> $head_version, CHANGELOG promoted with correct footers."
          echo "Reminder: after merge, create the git tag + GitHub release (e.g., 'gh release create v$head_version') so the footer link resolves."
